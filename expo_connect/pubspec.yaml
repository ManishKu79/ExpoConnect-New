name: expo_connect
description: ExpoConnect - Next Generation Business Expo Management Platform
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State Management & Routing
  riverpod: ^2.5.1
  flutter_riverpod: ^2.5.1
  go_router: ^13.2.5

  # Networking
  dio: ^5.4.0
  retrofit: ^4.1.0
  logger: ^2.0.2

  # Storage
  flutter_secure_storage: ^9.2.2
  shared_preferences: ^2.2.2

  # UI
  flutter_svg: ^2.0.10
  lottie: ^3.1.0

  # QR Scanner
  mobile_scanner: ^4.0.1
  image_picker: ^1.0.7

  # Utilities
  intl: ^0.19.0
  connectivity_plus: ^6.0.1
  permission_handler: ^11.3.0

  # Other
  shimmer: ^3.0.0
  cached_network_image: ^3.3.1
  flutter_dotenv: ^5.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  build_runner: ^2.4.7
  retrofit_generator: ^8.0.0

flutter:
  uses-material-design: true

  assets:
    - .env