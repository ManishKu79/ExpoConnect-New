<!DOCTYPE html>
<html>
<head>
  <style>
    body { font-family: Arial, sans-serif; line-height: 1.6; color: #333; }
    .container { max-width: 600px; margin: 0 auto; padding: 20px; }
    .header { background: #2563eb; color: white; padding: 20px; text-align: center; }
    .content { padding: 20px; background: #f9f9f9; }
    .button { display: inline-block; padding: 12px 24px; background: #2563eb; color: white; text-decoration: none; border-radius: 5px; }
    .footer { text-align: center; padding: 20px; color: #666; font-size: 12px; }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>ExpoConnect</h1>
    </div>
    <div class="content">
      <h2>Welcome, {{name}}!</h2>
      <p>Thank you for registering with ExpoConnect. Please verify your email address to get started.</p>
      <p style="text-align: center; margin: 30px 0;">
        <a href="{{verificationUrl}}" class="button">Verify Email</a>
      </p>
      <p>If you didn't create an account with ExpoConnect, please ignore this email.</p>
      <p>This link will expire in 24 hours.</p>
    </div>
    <div class="footer">
      <p>&copy; 2024 ExpoConnect. All rights reserved.</p>
    </div>
  </div>
</body>
</html>
